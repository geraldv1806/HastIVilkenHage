<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VILKET HAGE GÅR HÄSTEN I?</title>
    <style>
         header {
            background-color: #152238;
            padding: 10px;
            text-align: center;
        }
        body {
            background-color: darkblue;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }
        #dropdown {
            margin: 20px auto;
            padding: 10px;
            width: 300px;
            background-color: white;
            border: 1px solid #ccc;
        }
        #resultBox {
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            background-color: yellow;
            font-size: 76px;
            font-weight: bold;
            color: black;
        }
        .button {
            padding: 10px 20px;
            margin-left: 20px; /* Space between the header and button */
            background-color: #ff2000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<header>
    <h1>Välkommen till Janstorp</h1>
    <h2>Välj häst?</h2>
    <button class="button" onclick="goToPage()">Go to Page</button>
</header>

<!-- Embedded Picture -->
<img src="HagKarta.jpg" alt="Embedded Image" style="width: 40%; max-width: 500px;">

<!-- Dropdown Box -->
<select id="dropdown" onchange="updateResult()">
    <option value="">Välj Häst</option>
    <!-- Add 60 names -->
    <option value="1">NATORP BO</option>
    <option value="2">UPSET TILE</option>
    <option value="3">GUSTAV SIMONI</option>
    <option value="4">SHEISPROPULSION</option>
    <option value="5">UNDER ARMOUR</option>
    <option value="6">EPICURE</option>
    <option value="7">ULTIMO TILE</option>
    <option value="8">BARON D.SOX</option>
    <option value="9">YTOWNS ULRIK</option>
    <option value="10">GLOBAL EVERYWHERE</option>
    <option value="11">PAPA HOCKE</option>
    <option value="12">NESSUNO IN PJ'S</option>
    <option value="13">BONAFONTE</option>
</select>

<!-- Result Box -->
<div id="resultBox">INGEN HÄST VALD</div>

<script>
    function updateResult() {
        const dropdown = document.getElementById('dropdown');
        const resultBox = document.getElementById('resultBox');
        const selectedValue = dropdown.value;
        // Update the result based on the selected name
        resultBox.innerText = selectedValue ? selectedValue : '0';
    }

    function goToPage() {
        window.location.href = "knappar.html"; // Change to your target page URL
    }
</script>

</body>
</html>
